<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPredictor</title>
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar panel layout">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-filter"></i></div>
                <span>Lead</span>Predictor
            </div>
            
            <div class="form-group">
                <label data-i18n="language">Language</label>
                <select id="language">
                    <option value="en">🇺🇸 English</option>
                    <option value="bg">🇧🇬 Bulgarian</option>
                    <option value="de">🇩🇪 German</option>
                </select>
            </div>

            <div class="form-group">
                <label data-i18n="currency">Currency</label>
                <select id="currency">
                    <option value="USD">$ US Dollar</option>
                </select>
            </div>

            <div class="form-group">
                <label data-i18n="campaignStart">Campaign Start</label>
                <div class="input-with-icon right">
                    <input type="date" id="campaign-start" value="2026-05-08">
                    <!-- <i class="far fa-calendar"></i> -->
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="campaignEnd">Campaign End</label>
                <div class="input-with-icon right">
                    <input type="date" id="campaign-end" value="2026-11-04">
                    <!-- <i class="far fa-calendar"></i> -->
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="totalRevenue">Total Revenue</label>
                <div class="input-with-icon">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="total-revenue" value="10000">
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="avgOrderValue">Avg. Order Value</label>
                <div class="input-with-icon">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="avg-order-value" value="1000">
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-section">
                <!-- Chart Area -->
                <div class="chart-container panel">
                    <canvas id="predictionChart"></canvas>
                </div>

                <!-- Stats Area -->
                <div class="stats-container">
                    <div class="stat-card panel">
                        <div class="stat-header">
                            <div><i class="far fa-folder"></i> <span data-i18n="prospects">Prospects</span></div>
                            <div class="stat-percent" id="prospects-percent">100%</div>
                        </div>
                        <div class="stat-value" id="prospects-value">125</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="prospects-progress" style="width: 100%;"></div>
                        </div>
                    </div>
                    
                    <div class="stat-card panel">
                        <div class="stat-header">
                            <div><i class="far fa-user"></i> <span data-i18n="leads">Leads</span></div>
                            <div class="stat-percent" id="leads-percent">20%</div>
                        </div>
                        <div class="stat-value" id="leads-value">25</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="leads-progress" style="width: 20%;"></div>
                        </div>
                    </div>

                    <div class="stat-card panel">
                        <div class="stat-header">
                            <div><i class="fas fa-trophy" style="color:#d1d5db"></i> <span data-i18n="customers">Customers</span></div>
                            <div class="stat-percent" id="customers-percent">8%</div>
                        </div>
                        <div class="stat-value" id="customers-value">10</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="customers-progress" style="width: 8%;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-section panel">
                <div class="slider-group">
                    <div class="slider-header">
                        <label data-i18n="leadResponseRate">Lead Response Rate</label>
                    </div>
                    <div class="slider-container">
                         <input type="range" id="lead-rate" min="1" max="100" step="1" value="40">
                    </div>
                    <div class="slider-value-right">
                        <span id="lead-rate-val">40.00%</span>
                    </div>
                </div>

                <div class="slider-group">
                    <div class="slider-header">
                        <label data-i18n="prospectResponseRate">Prospect Response Rate</label>
                    </div>
                    <div class="slider-container">
                        <input type="range" id="prospect-rate" min="1" max="100" step="1" value="20">
                    </div>
                    <div class="slider-value-right">
                        <span id="prospect-rate-val">20.00%</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
